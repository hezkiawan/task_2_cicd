name: Full-Stack CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-validate:
    name: Build Images & Validate K8s
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Go Backend Image
        run: docker build -t my-go-backend ./go-backend

      - name: Build Next.js Frontend Image
        run: docker build -t my-next-frontend ./my-next-frontend

      # ==========================================
      # NEW: Spin up a temporary Minikube cluster
      # ==========================================
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        # This action automatically installs Minikube, starts it, 
        # and points the runner's kubectl context directly to it.

      # ==========================================
      # Now kubectl has a real API server to talk to!
      # ==========================================
      - name: Validate Kubernetes YAML
        run: |
          kubectl apply -f k8s-setup.yaml --dry-run=client