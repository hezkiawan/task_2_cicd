name: Full-Stack CI/CD Pipeline

on:
  push:
    branches:
      - main

# Grant the pipeline permission to push images to the GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    name: Build, Test, and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. Automated Testing (CI)
      # ==========================================
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Ensure this matches your project's Go version
          
      - name: Run Go Unit Tests
        run: |
          cd go-backend
          go test -v ./...

      # ==========================================
      # 2. Build Docker Images
      # ==========================================
      # Note: We build with :v3 here to match the k8s-setup.yaml in your repository
      - name: Build Go Backend Image
        run: docker build -t my-go-backend:v4 ./go-backend

      - name: Build Next.js Frontend Image
        run: docker build -t my-next-frontend:v4 ./my-next-frontend

      # ==========================================
      # 3. Simulate Kubernetes Deployment
      # ==========================================
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Load Images into Minikube
        run: |
          minikube image load my-go-backend:v4
          minikube image load my-next-frontend:v4

      - name: Deploy to Minikube
        run: kubectl apply -f k8s-setup.yaml

      - name: Verify Deployment Success
        run: |
          kubectl rollout status deployment/go-backend --timeout=120s || (echo "Backend deployment failed! Fetching logs..." && kubectl describe pods -l app=go-backend && kubectl logs -l app=go-backend --tail=100 && exit 1)
          kubectl rollout status deployment/next-frontend --timeout=300s || (echo "Deployment failed! Fetching K8s logs..." && kubectl describe pods -l app=next-frontend && kubectl logs -l app=next-frontend --tail=100 && exit 1)
      # ==========================================
      # 4. Continuous Delivery (CD) to GHCR
      # ==========================================
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push Images to GHCR
        run: |
          # Convert repository name to lowercase (GHCR requirement)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Tag the local v3 images as 'latest' for the registry
          docker tag my-go-backend:v4 ghcr.io/$REPO/go-backend:latest
          docker tag my-next-frontend:v4 ghcr.io/$REPO/next-frontend:latest
          
          # Push to GitHub Container Registry
          docker push ghcr.io/$REPO/go-backend:latest
          docker push ghcr.io/$REPO/next-frontend:latest