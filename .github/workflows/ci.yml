name: Full-Stack CI/CD Pipeline

on:
  push:
    branches:
      - main

# Grant the pipeline permission to push images to the GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    name: Build, Test, and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. Automated Testing (CI)
      # ==========================================
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Run Go Unit Tests
        run: |
          cd go-backend
          go test -v ./...

      # ==========================================
      # 2. Build Docker Images (Using Dynamic SHA)
      # ==========================================
      - name: Build Go Backend Image
        run: docker build -t my-go-backend:${{ github.sha }} ./go-backend

      - name: Build Next.js Frontend Image
        run: docker build -t my-next-frontend:${{ github.sha }} ./my-next-frontend

      # ==========================================
      # 3. Simulate Kubernetes Deployment
      # ==========================================
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Load Images into Minikube
        run: |
          minikube image load my-go-backend:${{ github.sha }}
          minikube image load my-next-frontend:${{ github.sha }}

      - name: Inject Dynamic Image Tags into YAML
        run: |
          # Uses 'sed' to replace __IMAGE_TAG__ with the unique Git commit hash
          sed -i "s/__IMAGE_TAG__/${{ github.sha }}/g" k8s-setup.yaml

      - name: Deploy to Minikube
        run: kubectl apply -f k8s-setup.yaml

      - name: Verify Deployment Success
        run: |
          kubectl rollout status deployment/go-backend --timeout=120s || (echo "Backend deployment failed! Fetching logs..." && kubectl describe pods -l app=go-backend && kubectl logs -l app=go-backend --tail=100 && exit 1)
          
          kubectl rollout status deployment/next-frontend --timeout=300s || (echo "Frontend deployment failed! Fetching K8s logs..." && kubectl describe pods -l app=next-frontend && kubectl logs -l app=next-frontend --tail=100 && exit 1)

      # ==========================================
      # 4. Continuous Delivery (CD) to GHCR
      # ==========================================
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push Images to GHCR
        run: |
          # Convert repository name to lowercase (GHCR requirement)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Tag with the unique commit hash
          docker tag my-go-backend:${{ github.sha }} ghcr.io/$REPO/go-backend:${{ github.sha }}
          docker tag my-next-frontend:${{ github.sha }} ghcr.io/$REPO/next-frontend:${{ github.sha }}
          
          # Also tag as 'latest' for easy pulling
          docker tag my-go-backend:${{ github.sha }} ghcr.io/$REPO/go-backend:latest
          docker tag my-next-frontend:${{ github.sha }} ghcr.io/$REPO/next-frontend:latest
          
          # Push everything to GitHub Container Registry
          docker push ghcr.io/$REPO/go-backend --all-tags
          docker push ghcr.io/$REPO/next-frontend --all-tags